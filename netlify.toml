# ============================================
# ADMIN PANEL DEPLOYMENT (admin-web site)
# ============================================
[build]
  command   = "cd admin-web && npm install && npm run build"
  publish   = "admin-web/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for admin app
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

